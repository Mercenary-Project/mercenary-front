name: Deploy Frontend

on:
    push:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: deploy-frontend-production
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Build
              run: npm run build
              env:
                  VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
                  VITE_API_PROXY_TARGET: ${{ secrets.VITE_API_PROXY_TARGET }}
                  VITE_DEV_LOGIN_ENDPOINT: ${{ secrets.VITE_DEV_LOGIN_ENDPOINT }}
                  VITE_KAKAO_CODE_EXCHANGE_ENDPOINT: ${{ secrets.VITE_KAKAO_CODE_EXCHANGE_ENDPOINT }}
                  VITE_KAKAO_REST_API_KEY: ${{ secrets.VITE_KAKAO_REST_API_KEY }}
                  VITE_KAKAO_REDIRECT_URI: ${{ secrets.VITE_KAKAO_REDIRECT_URI }}

            - name: Upload build artifacts to Lightsail
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.LIGHTSAIL_HOST }}
                  username: ${{ secrets.LIGHTSAIL_USER }}
                  key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
                  port: 22
                  source: dist
                  target: /home/${{ secrets.LIGHTSAIL_USER }}/deploy/mercenary-front
                  overwrite: true
                  rm: true

            - name: Publish build on server
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.LIGHTSAIL_HOST }}
                  username: ${{ secrets.LIGHTSAIL_USER }}
                  key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
                  port: 22
                  script: |
                      mkdir -p /var/www/mercenary-front
                      rm -rf /var/www/mercenary-front/*
                      cp -r /home/${{ secrets.LIGHTSAIL_USER }}/deploy/mercenary-front/dist/* /var/www/mercenary-front/
                      find /var/www/mercenary-front -type d -exec chmod 755 {} \;
                      find /var/www/mercenary-front -type f -exec chmod 644 {} \;
                      sudo nginx -t
                      sudo systemctl reload nginx
